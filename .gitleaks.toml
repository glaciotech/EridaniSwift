title = "EridaniSwift Gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "eridani-openai-api-key"
description = "OpenAI API key"
regex = '''\b(sk-[A-Za-z0-9]{20,})\b'''
keywords = ["sk-"]

[[rules]]
id = "eridani-anthropic-api-key"
description = "Anthropic API key"
regex = '''\b(sk-ant-[A-Za-z0-9_-]{10,})\b'''
keywords = ["sk-ant-"]

[[rules]]
id = "eridani-xai-api-key-assignment"
description = "xAI/Grok API key assignment (env var style)"
regex = '''(?i)\b(XAI|GROK)_(API_)?KEY\b\s*[:=]\s*['\"]?([A-Za-z0-9_\-]{20,})['\"]?'''
secretGroup = 3
keywords = ["XAI", "GROK", "KEY"]
